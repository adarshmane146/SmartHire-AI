<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Indian Fresher & Internship Portal</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Inter, Segoe UI, Tahoma, sans-serif;
}

/* Background */
.auth-page{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    position: relative;
    overflow: hidden;
}

.auth-page::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 60%);
    opacity: 0.8;
    pointer-events: none;
}

/* Login card */
.auth-container{
    width:400px;
    padding:45px 40px;
    background:rgba(255, 255, 255, 0.98);
    border-radius:24px;
    text-align:center;
    box-shadow: 0 25px 70px rgba(0,0,0,0.2);
    backdrop-filter: blur(10px);
    position: relative;
    z-index: 10;
}

/* Title */
.auth-header h2{
    color:#3730a3;
    margin-bottom:8px;
    font-weight:800;
    font-size: 1.8rem;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
}

.auth-header p {
    color: #6b7280;
    margin-bottom: 30px;
    font-size: 0.95em;
}

/* Input fields */
.auth-container input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border-radius:12px;
    border:2px solid #f3f4f6;
    font-size:15px;
    background:#f9fafb;
    color: #374151;
    transition: all 0.3s ease;
}

.auth-container input:focus{
    outline:none;
    background:white;
    border-color:#6366f1;
    box-shadow:0 0 0 4px rgba(99, 102, 241, 0.1);
}

/* Button */
.auth-btn{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:700;
    color:white;
    background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
    cursor:pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
}

/* Button hover */
.auth-btn:hover{
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(79, 70, 229, 0.4);
    background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
}

.auth-btn:active{
    transform: translateY(1px);
    box-shadow: 0 2px 10px rgba(79, 70, 229, 0.3);
}

/* Signup text */
.auth-container p.auth-link{
    margin-top:25px;
    font-size:14.5px;
    color: #6b7280;
}

.auth-container a{
    color:#4f46e5;
    font-weight: 600;
    text-decoration:none;
    transition: color 0.2s;
}

.auth-container a:hover{
    color:#3730a3;
    text-decoration:underline;
}</style>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h2>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                Create Account
            </h2>
            <p>Join SmartHire and land your dream job</p>
        </div>
        <form id="signupForm" onsubmit="handleSignup(event)">
            <input type="text" id="name" placeholder="Full Name" required />
            <input type="email" id="email" placeholder="Email Address" required />
            <input type="password" id="password" placeholder="Create Password" required />
            <button type="submit" class="auth-btn">Sign Up</button>
        </form>
        <p class="auth-link">
            Already have an account? <a href="login.html">Login here</a>
        </p>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
